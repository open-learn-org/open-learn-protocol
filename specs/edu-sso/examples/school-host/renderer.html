<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>School Host</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #0f1115;
        color: #e2e8f0;
        overflow: hidden;
      }
      header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 24px; height: 56px; box-sizing: border-box;
        border-bottom: 1px solid #1e293b; background: #111827;
      }
      .title { font-weight: 600; font-size: 14px; letter-spacing: 0.01em; }
      .student { font-size: 12px; color: #94a3b8; }
      button {
        background: transparent; color: inherit; border: 1px solid #334155;
        border-radius: 6px; padding: 6px 12px; font: inherit; cursor: pointer;
      }
      button:hover { background: #1e293b; }
      main { padding: 40px 48px; overflow: auto; height: calc(100% - 56px); box-sizing: border-box; }
      h1 { margin: 0 0 4px; font-size: 28px; }
      .lead { color: #94a3b8; margin: 0 0 32px; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 16px; max-width: 900px;
      }
      .card {
        text-align: left; padding: 24px; border: 1px solid #1e293b;
        background: #111827; border-radius: 12px; cursor: pointer;
        display: flex; flex-direction: column; gap: 12px;
      }
      .card:hover { background: #1f2937; border-color: #334155; }
      .icon { font-size: 40px; line-height: 1; }
      .card-name { font-size: 16px; font-weight: 500; }
      #error {
        display: none; margin-top: 16px; padding: 12px 16px;
        background: #7f1d1d; border-radius: 8px; color: #fee2e2; font-size: 13px;
      }
    </style>
  </head>
  <body>
    <header>
      <span class="title" id="title">School Host</span>
      <span class="student" id="student">…</span>
      <button id="close" style="display: none">← Close</button>
    </header>
    <main id="home">
      <h1 id="greeting">Hello!</h1>
      <p class="lead">Pick something to learn today.</p>
      <div class="grid" id="grid"></div>
      <div id="error"></div>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
